---
# Full Infrastructure Setup
# This playbook runs both base setup and K8s control plane configuration

- name: Full infrastructure setup
  import_playbook: setup.yml

- name: Setup Kubernetes control plane
  import_playbook: k8s_control_plane.yml

- name: Setup Kubernetes workers
  import_playbook: k8s_worker.yml

- name: Install External Secrets Operator
  import_playbook: eso.yml

- name: Install ArgoCD
  import_playbook: argocd-install.yml

- name: Bootstrap ArgoCD
  import_playbook: argocd-bootstrap.yml