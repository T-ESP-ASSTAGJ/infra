---
# Initialize Kubernetes control plane with kubeadm

- name: Check if Kubernetes is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_admin_conf

- name: Initialize Kubernetes control plane
  when: not k8s_admin_conf.stat.exists
  block:
    - name: Create kubeadm configuration file
      ansible.builtin.template:
        src: kubeadm_config.yaml.j2
        dest: /tmp/kubeadm-config.yaml
        mode: '0600'

    - name: Run kubeadm init
      ansible.builtin.command: >
        kubeadm init
        --config=/tmp/kubeadm-config.yaml
        --upload-certs
        --skip-phases=addon/kube-proxy
        --v=5
      register: kubeadm_init
      changed_when: "'Your Kubernetes control-plane has initialized successfully' in kubeadm_init.stdout"

    - name: Increase kube-apiserver liveness probe threshold for CNI initialization
      ansible.builtin.replace:
        path: /etc/kubernetes/manifests/kube-apiserver.yaml
        regexp: '(failureThreshold:) 8'
        replace: '\1 30'

    - name: Wait for API server to be ready
      ansible.builtin.uri:
        url: "https://{{ k8s_advertise_address | default(ansible_default_ipv4.address) }}:6443/healthz"
        validate_certs: false
        status_code: 200
      register: apiserver_health
      retries: 30
      delay: 10
      until: apiserver_health.status == 200

    - name: Wait for API server to be fully ready for kubectl
      ansible.builtin.command: >
        kubectl get --raw=/readyz
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: api_ready
      until: api_ready.rc == 0
      retries: 30
      delay: 10
      changed_when: false

    - name: Patch CoreDNS to forward to Azure upstream DNS
      ansible.builtin.shell: |
        kubectl get configmap coredns -n kube-system -o yaml | \
        sed 's|forward . /etc/resolv.conf|forward . {{ k8s_upstream_dns }}|' | \
        kubectl apply -f -
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      changed_when: true

    - name: Restart CoreDNS to pick up new config
      ansible.builtin.command: >
        kubectl rollout restart deployment/coredns -n kube-system
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      changed_when: true

    - name: Save kubeadm init output
      ansible.builtin.copy:
        content: "{{ kubeadm_init.stdout }}"
        dest: /root/kubeadm-init-output.txt
        mode: '0600'

    - name: Extract control plane join command
      ansible.builtin.shell: |
        grep -A 3 "You can now join any number of control-plane" /root/kubeadm-init-output.txt | grep -v "^--" | tr -d '\n' | sed 's/\s\+/ /g'
      register: control_plane_join_command
      changed_when: false
      failed_when: false

    - name: Save control plane join command
      ansible.builtin.copy:
        content: "{{ control_plane_join_command.stdout }}"
        dest: /root/k8s-control-plane-join-command.sh
        mode: '0700'
      when: control_plane_join_command.stdout != ""

- name: Ensure CoreDNS forwards to Azure upstream DNS
  block:
    - name: Get current CoreDNS config
      ansible.builtin.command: >
        kubectl get configmap coredns -n kube-system -o jsonpath='{.data.Corefile}'
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: coredns_config
      changed_when: false

    - name: Patch CoreDNS to forward to Azure upstream DNS
      ansible.builtin.shell: |
        kubectl get configmap coredns -n kube-system -o yaml | \
        sed 's|forward . /etc/resolv.conf|forward . {{ k8s_upstream_dns }}|' | \
        kubectl apply -f -
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      when: "'forward . /etc/resolv.conf' in coredns_config.stdout"

    - name: Restart CoreDNS to pick up new config
      ansible.builtin.command: >
        kubectl rollout restart deployment/coredns -n kube-system
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      when: "'forward . /etc/resolv.conf' in coredns_config.stdout"

- name: Generate worker join command
  ansible.builtin.command:
    cmd: kubeadm token create --print-join-command
  register: worker_join_command
  changed_when: false

- name: Save worker join command
  ansible.builtin.copy:
    content: "{{ worker_join_command.stdout }}"
    dest: /root/k8s-worker-join-command.sh
    mode: '0700'
