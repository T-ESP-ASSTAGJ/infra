---
# Install and configure CNI plugin (Cilium)

- name: Apply Gateway API CRDs
  ansible.builtin.command: >
    kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.0/standard-install.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Check if CNI is already installed
  ansible.builtin.command: kubectl get pods -n kube-system -l k8s-app=cilium
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: cilium_check
  changed_when: false
  failed_when: false

- name: Determine if Cilium is installed
  ansible.builtin.set_fact:
    cilium_installed: "{{ cilium_check.rc == 0 and 'cilium' in cilium_check.stdout }}"

- name: Install Cilium CNI
  when: not cilium_installed
  block:
    - name: Check if Cilium CLI is installed
      ansible.builtin.command: which cilium
      register: cilium_cli_check
      changed_when: false
      failed_when: false

    - name: Install Cilium CLI
      when: cilium_cli_check.rc != 0
      block:
        - name: Get Cilium CLI latest version
          ansible.builtin.uri:
            url: https://api.github.com/repos/cilium/cilium-cli/releases/latest
            return_content: true
          register: cilium_cli_release

        - name: Set Cilium CLI version
          ansible.builtin.set_fact:
            cilium_cli_version: "{{ cilium_cli_release.json.tag_name }}"

        - name: Download Cilium CLI
          ansible.builtin.get_url:
            url: "https://github.com/cilium/cilium-cli/releases/download/{{ cilium_cli_version }}/cilium-linux-{{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}.tar.gz"
            dest: /tmp/cilium-cli.tar.gz
            mode: '0644'

        - name: Extract Cilium CLI
          ansible.builtin.unarchive:
            src: /tmp/cilium-cli.tar.gz
            dest: /usr/local/bin
            remote_src: true
            mode: '0755'

        - name: Clean up Cilium CLI tarball
          ansible.builtin.file:
            path: /tmp/cilium-cli.tar.gz
            state: absent

    - name: Wait for API server to be fully ready
      ansible.builtin.command: >
        kubectl get --raw=/readyz
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: api_ready
      until: api_ready.rc == 0
      retries: 30
      delay: 10
      changed_when: false

    - name: Install Cilium using CLI
      ansible.builtin.command: >
        cilium install
        --version {{ cilium_version }}
        --set ipam.mode={{ cilium_ipam_mode }}
        --set ipam.operator.clusterPoolIPv4PodCIDRList={{ k8s_pod_network_cidr }}
        --set kubeProxyReplacement={{ cilium_kube_proxy_replacement | string | lower }}
        --set k8sServiceHost={{ k8s_advertise_address | default(ansible_default_ipv4.address) }}
        --set k8sServicePort=6443
        --set routing-mode=tunnel
        --set gatewayAPI.enabled=true
        {{ '--set hubble.enabled=' + (cilium_hubble_enabled | string | lower) if cilium_hubble_enabled is defined else '' }}
        {{ '--set hubble.relay.enabled=' + (cilium_hubble_enabled | string | lower) if cilium_hubble_enabled is defined else '' }}
        {{ '--set hubble.ui.enabled=' + (cilium_hubble_enabled | string | lower) if cilium_hubble_enabled is defined else '' }}
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: cilium_install
      changed_when: "'✅' in cilium_install.stdout or 'successfully' in cilium_install.stdout.lower()"

    - name: Wait for Cilium to be ready
      ansible.builtin.command: cilium status --wait
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: cilium_status
      until: cilium_status.rc == 0
      retries: 30
      delay: 10
      changed_when: false

- name: Copy Gateway manifest to control plane
  ansible.builtin.copy:
    src: gateway.yaml
    dest: /tmp/gateway.yaml
    mode: '0644'

- name: Apply Cilium Gateway manifest
  ansible.builtin.command: kubectl apply -f /tmp/gateway.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Wait for Cilium to create the Gateway service
  ansible.builtin.command: >
    kubectl get svc cilium-gateway-jamly-gateway -n kube-system
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: gateway_svc
  until: gateway_svc.rc == 0
  retries: 20
  delay: 5
  changed_when: false

- name: Pin Gateway NodePort to 30080
  ansible.builtin.command: >
    kubectl patch svc cilium-gateway-jamly-gateway -n kube-system
    --type=json
    -p='[{"op":"replace","path":"/spec/ports/0/nodePort","value":30080}]'
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Copy namespaces manifest to control plane
  ansible.builtin.copy:
    src: namespaces.yaml
    dest: /tmp/namespaces.yaml
    mode: '0644'

- name: Apply namespaces
  ansible.builtin.command: kubectl apply -f /tmp/namespaces.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Copy API deployment manifest to control plane
  ansible.builtin.copy:
    src: api-deployment.yaml
    dest: /tmp/api-deployment.yaml
    mode: '0644'

- name: Apply API deployment
  ansible.builtin.command: kubectl apply -f /tmp/api-deployment.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Copy API service manifest to control plane
  ansible.builtin.copy:
    src: api-service.yaml
    dest: /tmp/api-service.yaml
    mode: '0644'

- name: Apply API service
  ansible.builtin.command: kubectl apply -f /tmp/api-service.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Copy API HTTPRoute manifest to control plane
  ansible.builtin.copy:
    src: httproute-api.yaml
    dest: /tmp/httproute-api.yaml
    mode: '0644'

- name: Apply API HTTPRoute
  ansible.builtin.command: kubectl apply -f /tmp/httproute-api.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Copy Web HTTPRoute manifest to control plane
  ansible.builtin.copy:
    src: httproute-web.yaml
    dest: /tmp/httproute-web.yaml
    mode: '0644'

- name: Apply Web HTTPRoute
  ansible.builtin.command: kubectl apply -f /tmp/httproute-web.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Verify CNI is working
  ansible.builtin.command: kubectl get nodes -o wide
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: nodes_status
  changed_when: false