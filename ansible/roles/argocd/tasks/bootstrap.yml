---

- name: Check if root-app Application already exists
  ansible.builtin.command: >
    kubectl get application root-app -n argocd
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: root_app_check
  changed_when: false
  failed_when: false

- name: Copy root-app manifest to control plane
  ansible.builtin.copy:
    src: root-app.yaml
    dest: /tmp/root-app.yaml
    mode: '0644'
  when: root_app_check.rc != 0

- name: Apply root-app Application
  ansible.builtin.command: >
    kubectl apply -f /tmp/root-app.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true
  when: root_app_check.rc != 0

- name: Remove root-app manifest from tmp
  ansible.builtin.file:
    path: /tmp/root-app.yaml
    state: absent
  when: root_app_check.rc != 0

- name: Wait for ArgoCD to sync root-app Application
  ansible.builtin.command: >
    kubectl get application root-app -n argocd
    -o jsonpath='{.status.sync.status}'
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: root_sync_status
  until: root_sync_status.stdout in ['Synced', 'OutOfSync']
  retries: 20
  delay: 15
  changed_when: false

- name: Display root-app Application sync status
  ansible.builtin.debug:
    msg: "Root-app Application status: {{ root_sync_status.stdout }}"