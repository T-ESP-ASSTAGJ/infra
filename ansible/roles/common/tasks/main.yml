---
# Main tasks for common role - system setup and hardening

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  retries: 3
  delay: 5
  register: apt_update
  until: apt_update is succeeded

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: no
  register: apt_install
  retries: 3
  delay: 5
  until: apt_install is succeeded

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: safe
    autoremove: yes
    autoclean: yes
  register: apt_upgrade
  when: perform_system_upgrade | default(true)

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"
  when: timezone is defined

- name: Configure UFW firewall
  when: enable_ufw_firewall | default(false)
  block:
    - name: Install UFW
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: Ensure SSH is allowed before enabling UFW
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp
        comment: "SSH - Critical, allow before enabling firewall"

    - name: Configure common firewall rules
      community.general.ufw:
        rule: "{{ item.rule }}"
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        comment: "{{ item.comment | default(omit) }}"
      loop: "{{ common_firewall_rules }}"
      when: common_firewall_rules is defined

    - name: Configure UFW default policies
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: Allow outgoing traffic
      community.general.ufw:
        state: enabled
        policy: allow
        direction: outgoing

- name: Install Helm
  when: install_helm | default(false)
  block:
    - name: Check if Helm is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/helm
      register: helm_binary

    - name: Download and install Helm
      when: not helm_binary.stat.exists
      block:
        - name: Download Helm installation script
          ansible.builtin.get_url:
            url: https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3
            dest: /tmp/get_helm.sh
            mode: '0755'

        - name: Run Helm installation script
          ansible.builtin.command: /tmp/get_helm.sh
          changed_when: true

        - name: Remove Helm installation script
          ansible.builtin.file:
            path: /tmp/get_helm.sh
            state: absent

    - name: Verify Helm is functional
      ansible.builtin.command: helm version --short
      changed_when: false
      register: helm_version

    - name: Display Helm version
      ansible.builtin.debug:
        msg: "Helm installed: {{ helm_version.stdout }}"

- name: Ensure system is ready
  ansible.builtin.debug:
    msg: "Common setup completed successfully"