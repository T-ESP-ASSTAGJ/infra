apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-infra-repo
  namespace: argocd
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: azure-kv-cluster
    kind: ClusterSecretStore
  target:
    name: argocd-infra-repo
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: https://github.com/T-ESP-ASSTAGJ/infra.git
        username: git
        password: "{{ .github-token }}"
  data:
    - secretKey: github-token
      remoteRef:
        key: github-token