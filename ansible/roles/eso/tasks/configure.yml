---
- name: Copy SecretStore manifest
  ansible.builtin.template:
    src: secretstore.yaml.j2
    dest: /tmp/secretstore.yaml
    mode: '0644'

- name: Clear kubectl API discovery cache
  ansible.builtin.file:
    path: /root/.kube/cache/discovery
    state: absent

- name: Wait for external-secrets.io API group to be discoverable
  ansible.builtin.command: >
    kubectl api-resources --api-group=external-secrets.io
    --kubeconfig /etc/kubernetes/admin.conf
  register: eso_api_ready
  until: '"ClusterSecretStore" in eso_api_ready.stdout and "SecretStore" in eso_api_ready.stdout'
  retries: 24
  delay: 5
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Apply SecretStore
  ansible.builtin.command: kubectl apply -f /tmp/secretstore.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Wait for ESO webhook to be ready
  ansible.builtin.command: >
    kubectl rollout status deployment/external-secrets-webhook
    -n external-secrets
    --timeout=120s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Copy ClusterSecretStore manifest
  ansible.builtin.template:
    src: clustersecretstore.yaml.j2
    dest: /tmp/clustersecretstore.yaml
    mode: '0644'

- name: Apply ClusterSecretStore
  ansible.builtin.command: kubectl apply -f /tmp/clustersecretstore.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Copy ExternalSecret manifest
  ansible.builtin.copy:
    src: externalsecret.yaml
    dest: /tmp/externalsecret.yaml
    mode: '0644'

- name: Apply ExternalSecret
  ansible.builtin.command: kubectl apply -f /tmp/externalsecret.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Create argocd namespace if not exists
  ansible.builtin.command: >
    kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Copy ArgoCD ExternalSecret manifest
  ansible.builtin.copy:
    src: externalsecret-argocd.yaml
    dest: /tmp/externalsecret-argocd.yaml
    mode: '0644'

- name: Apply ArgoCD ExternalSecret
  ansible.builtin.command: kubectl apply -f /tmp/externalsecret-argocd.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false