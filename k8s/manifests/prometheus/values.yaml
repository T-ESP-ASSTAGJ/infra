prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        memory: "512Mi"
        cpu: "200m"
      limits:
        memory: "1Gi"
        cpu: "500m"

prometheusOperator:
  admissionWebhooks:
    enabled: false
    patch:
      enabled: false

grafana:
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

  env:
    GF_INSTALL_PLUGINS: ""
    GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "quickwit-quickwit-datasource"

  extraInitContainers:
    - name: install-quickwit-plugin
      image: busybox
      command:
        - sh
        - -c
        - |
          wget -O /tmp/quickwit-plugin.zip https://github.com/quickwit-oss/quickwit-datasource/releases/latest/download/quickwit-quickwit-datasource.zip
          unzip /tmp/quickwit-plugin.zip -d /var/lib/grafana/plugins/
      volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana

  additionalDataSources:
    - name: Quickwit
      type: quickwit-quickwit-datasource
      url: http://quickwit-searcher.monitoring.svc.cluster.local:7280
      access: proxy
      isDefault: false

alertmanager:
  enabled: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

crds:
  enabled: true