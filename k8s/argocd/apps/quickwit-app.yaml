apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quickwit
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"

spec:
  project: default
  sources:
    - repoURL: https://helm.quickwit.io
      chart: quickwit
      targetRevision: 0.8.4
      helm:
        valueFiles:
          - $values/k8s/manifests/quickwit/values.yaml
    - repoURL: https://github.com/T-ESP-ASSTAGJ/infra.git
      targetRevision: staging
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true