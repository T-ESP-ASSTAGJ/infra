apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: rke2-cilium
  namespace: kube-system
spec:
  valuesContent: |-

    cni:
      exclusive: true
      chainingMode: "none"

    k8sServiceHost: "192.168.10.13"
    k8sServicePort: 6443

    debug:
      enabled: true

    routingMode: native

    ipam:
      mode: kubernetes

    ipv4NativeRoutingCIDR: "10.42.0.0/16" 

    kubeProxyReplacement: true

    ipv4:
      enabled: true
    ipv6:
      enabled: false

    bpf:
      masquerade: true
      ctTcpMax: 65535
      ctAnyMax: 65535

    ipMasqAgent:
      enabled: false
    enableIPv4Masquerade: true

    enableHostLegacyRouting: false
    autoDirectNodeRoutes: true

    l2announcements:
      enabled: false

    hubble:
      enabled: true
      eventBufferCapacity: "65535"
      ui:
        enabled: true
        baseUrl: "/hubble/"
        replicas: 1
        frontend:
          image:
            tag: "v0.12.3"
        backend:
          image:
            tag: "v0.12.3"
      relay:
        enabled: true

    ingressController:
      enabled: false
    gatewayAPI:
      enabled: false
    bgpControlPlane:
      enabled: true
