apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: rke2-cilium
  namespace: kube-system
spec:
  valuesContent: |-
    
    cni:
      exclusive: true
      chainingMode: "none"
    
    k8sServiceHost: "192.168.10.13"
    k8sServicePort: 6443
    autoDirectNodeRoutes: true
    enableHostLegacyRouting: false*
    
    debug:
      enabled: true
    
    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true
    
    routingMode: native
    
    ipam:
      mode: "kubernetes"
    
    ipv4NativeRoutingCIDR: "10.42.0.0/16" 
    
    kubeProxyReplacement: true

    ingressController:
      enabled: false
    
    gatewayAPI:
      enabled: false
    
    bgpControlPlane:
      enabled: true
    
    l2announcements:
      enabled: false
    
    bpf:
      masquerade: true

    enableIPv4Masquerade: false
    
    enableHostLegacyRouting: false
