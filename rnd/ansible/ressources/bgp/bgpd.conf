# /etc/bgpd.conf - Final version based on provided documentation

# --- Global Settings ---
# AS 65001 is this router.
AS 65001
router-id 192.168.10.1
listen on 192.168.10.1
# 'fib-update yes' is confirmed as valid in your man page.
fib-update yes

# --- Filters (Prefix Sets) ---
# Define a set for our LoadBalancer IPs.
# 'or-longer' matches the /29 block and any more specific prefix,
# which is exactly what we need for Cilium's /32 advertisements.
prefix-set cilium-lb-ips {
    192.168.200.0/24 or-longer
}

# --- Neighbor Group ---
# Defines the Kubernetes nodes as BGP neighbors.
group "Cilium-Nodes" {
    # remote-as must match Cilium's localASN.
    remote-as 65000
    neighbor 192.168.10.10
    neighbor 192.168.10.11
    neighbor 192.168.10.12
    neighbor 192.168.10.13
    neighbor 192.168.10.14
}


# --- Routing Policies (Allow/Deny) ---
# A safe default is to deny everything.
deny from any
deny to any

# INBOUND POLICY: Allow routes from our Cilium nodes
# if they match the 'cilium-lb-ips' prefix-set.
allow from group "Cilium-Nodes" prefix-set cilium-lb-ips