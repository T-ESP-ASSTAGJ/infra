apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  name: "default-peer-config"
spec:
  timers:
    holdTimeSeconds: 9
    keepAliveTimeSeconds: 3
  ebgpMultihop: 4
  gracefulRestart:
    enabled: true
    restartTimeSeconds: 15
  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          purpose: announce-services