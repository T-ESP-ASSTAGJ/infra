apiVersion: v1
kind: ServiceAccount
metadata:
  name: bytebase-app-sa
  namespace: bytebase

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bytebase
  namespace: bytebase
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bytebase
  
  template:
    metadata:
#      annotations:
#        vault.hashicorp.com/agent-inject: "true"
#        vault.hashicorp.com/agent-inject-status: "updated"
#        vault.hashicorp.com/role: "bytebase-app-role"
#        vault.hashicorp.com/ca-cert: "/vault/tls/ca.crt"
#        vault.hashicorp.com/client-cert: "/vault/tls/tls.crt"
#        vault.hashicorp.com/client-key: "/vault/tls/tls.key"
#        vault.hashicorp.com/tls-secret: "bytebase-client-vault-tls"
#        vault.hashicorp.com/agent-inject-template-pg_conn_string: |
#          {{- with secret "bytebase-database/creds/bytebase-readwrite-role" -}}
#          postgresql://{{ .Data.username }}:{{ .Data.password | urlquery }}@192.168.200.40:5433/bytebase
#          {{- end -}}
      labels:
        app: bytebase
    spec:
      serviceAccountName: bytebase-app-sa
      containers:
        - name: bytebase
          image: bytebase/bytebase:latest
          imagePullPolicy: Always
          env:
            - name: PG_URL
              value: 'postgresql://bytebase:REPLACE_ME@192.168.200.40:5433/bytebase'
          args:
            - '--port'
            - '8080'
            - '--external-url'
            - 'https://docs.bytebase.com/get-started/install/external-url'
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 300
            periodSeconds: 300
            timeoutSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bytebase-ui
  namespace: bytebase
spec:
  type: ClusterIP
  selector:
    app: bytebase
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
