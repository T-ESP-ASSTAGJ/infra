#  - { category: 'third-party/stripe', name: 'api-key' }
#  
- name: "Step 1: Construct the consolidated policy for {{ vault_auth_role }}"
  ansible.builtin.set_fact:
    policy_rules: |+
      # Policy for application role: {{ vault_auth_role }}
      # This policy is auto-generated by Ansible.
      {% for secret in app_secrets %}
      # Grant read access to {{ secret.name }}
      path "{{ secrets_mount_path }}/data/{{ secret.category }}/{{ secret.name }}" {
        capabilities = ["read"]
      }
      {% endfor %}

- name: "Step 2: Create or update the Vault policy for {{ vault_auth_role }}"
  community.hashi_vault.vault_policy:
    name: "{{ vault_auth_role }}-policy"
    rules: "{{ policy_rules }}"
    verify: false
    no_log: false

- name: "Step 3: Bind the single application policy to the Kubernetes auth role"
  community.hashi_vault.vault_auth_role:
    name: "{{ vault_auth_role }}"
    mount_point: {{ auth_mount_path}} 
    role_type: kubernetes
    bound_service_account_names:
      - "{{ app_service_account }}"
    bound_service_account_namespaces:
      - "{{ app_namespace }}"
    policies:
      - "{{ vault_auth_role }}-policy"
    ttl: 24h
    token_skew: 30s
    verify: false