- name: Check if cert-manager CRDs are already installed
  shell: kubectl get crd | grep cert-manager.io
  register: certmanager_crds_check
  changed_when: false
  failed_when: false

- name: Install cert-manager CRDs
  shell: kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.17.2/cert-manager.crds.yaml
  when: certmanager_crds_check.rc != 0

- name: Copy certmanager configuration files
  ansible.builtin.copy:
    src: "../ressources/k8s/certmanager/"
    dest: "/root/.kube/ressources/certmanager/"
    mode: '0644'
    backup: yes

- name: Install helm jetstack repo
  kubernetes.core.helm_repository:
    name: jetstack
    repo_url: https://charts.jetstack.io

- name: Check if Jetstack release exists
  kubernetes.core.helm_info:
    name: cert-manager
    namespace: cert-manager
  register: cert_manager_release_info
  ignore_errors: true

- name: Install Cert-manager
  kubernetes.core.helm:
    name: cert-manager
    chart_ref: jetstack/cert-manager
    namespace: cert-manager
    create_namespace: true
    values_files:
      - /root/.kube/ressources/certmanager/helm/cert-manager-values.yml
  when: cert_manager_release_info.status is undefined or cert_manager_release_info.status.status != "deployed"
  register: cert_manager_installed
  
- name: Ensure external-pki Endpoints object exists
  kubernetes.core.k8s:
    state: present
    src: /root/.kube/ressources/certmanager/pkiendpoint.yml

- name: Ensure external-pki Service object exists
  kubernetes.core.k8s:
    state: present
    src: /root/.kube/ressources/certmanager/pkiservice.yml

