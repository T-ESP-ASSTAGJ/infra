---
- name: Add longhorn Helm repository
  kubernetes.core.helm_repository:
    name: longhorn
    repo_url: https://charts.longhorn.io
  retries: 10
  delay: 10

- name: Update Helm repositories
  shell: helm repo update
  changed_when: false

- name: Copy longhorn value files
  ansible.builtin.copy:
    src: "../ressources/k8s/longhorn/"
    dest: "/root/.kube/ressources/longhorn/"
    mode: '0644'
    backup: yes

- name: Check if longhorn is already installed
  shell: helm list -n longhorn-system --output json
  register: longhorn_installed
  changed_when: false
  failed_when: false
  
- name: Create namespace for Longhorn
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: longhorn-system
    
- name: Apply all longhorn resources from directory
  shell: kubectl apply -f /root/.kube/ressources/longhorn/
  register: kubectl_apply_result
  changed_when: "'configured' in kubectl_apply_result.stdout or 'created' in kubectl_apply_result.stdout"
  when: "'longhorn' not in longhorn_installed.stdout"
  failed_when:
    - kubectl_apply_result.rc != 0
    - "'no objects passed to apply' not in kubectl_apply_result.stderr"

- name: Install longhorn using Helm
  kubernetes.core.helm:
    name: longhorn
    chart_ref: longhorn/longhorn
    namespace: longhorn-system
    create_namespace: false
    values_files:
      - /root/.kube/ressources/longhorn/helm/longhorn-default-values.yml
    timeout: 600s
  when: "'longhorn' not in longhorn_installed.stdout"
  register: longhorn_helm_install
  retries: 10
  delay: 10